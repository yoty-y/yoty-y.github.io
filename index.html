<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La web de Yoty-y</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="lectura-detallada">

    <div class="layout-global">
        <div class="overlay-fondo" id="overlay-sidebar"></div>

        <aside id="barra-lateral">
            <div class="opcion-navegacion divisor-sidebar" id="btn-toggle-sidebar-manual">
                <button class="btn-interactivo"><span>☰</span></button>
                <span class="texto-opcion" style="font-weight: bold;">Menú Lateral</span>
            </div>
            <nav id="menu-navegacion-paginas"></nav>
        </aside>

        <div class="contenido-interfaz">
            <header id="encabezado-fijo">
                <div class="header-izq">
                    <button class="btn-interactivo btn-menu-movil" id="btn-abrir-movil"><span>☰</span></button>
                    <h2 id="titulo-pagina">Mi Sitio Web</h2>
                </div>
                
                <div class="header-der">
                    <div class="posicion-menu-relativo">
                        <div class="contenedor-split-button">
                            <div class="split-accion-principal" id="btn-icono-tema-actual">
                                <span id="icono-tema" style="font-weight: bold;">A</span>
                            </div>
                            <div class="split-divisor"></div>
                            <div class="split-flecha" id="btn-abrir-temas">
                                <span>▼</span>
                            </div>
                        </div>
                        <div class="menu-flotante" id="menu-temas"></div>
                    </div>
                    
                    <div class="posicion-menu-relativo">
                        <button class="btn-interactivo" id="btn-abrir-opciones"><span>⋮</span></button>
                        <div class="menu-flotante" id="menu-opciones">
                            <div class="carpeta-categoria abierta">
                                <div class="carpeta-cabecera"><span>📖 MODOS DE LECTURA</span></div>
                                <div class="carpeta-contenido">
                                    <div class="item-tema-opcion" id="opt-lectura-detallada">
                                        <span>📚 Detallado</span>
                                    </div>
                                    <div class="item-tema-opcion" id="opt-lectura-resumida">
                                        <span>⚡ Sintético</span>
                                    </div>
                                </div>
                            </div>
                            <div class="menu-divisor-linea"></div>
                            <div class="item-tema-opcion" id="btn-restablecer">
                                <span>🔄 Restablecer</span>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <main id="contenedor-central"></main>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
