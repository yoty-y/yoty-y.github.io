<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La web de Yoty-y</title>
    
    <style>
        /* ========================================== */
        /* 1. VARIABLES Y CONFIGURACIÓN BASE          */
        /* ========================================== */
        :root {
            --ancho-sidebar: 250px;
            --alto-header: 50px;
            
            /* Colores Modo Claro */
            --bg-principal: #f4f4f9;
            --bg-tarjetas: #ffffff;
            --bg-sidebar: #e2e8f0;
            --texto-principal: #1a1a1a;
            --texto-secundario: #64748b;
            --borde-color: #cbd5e1;
            
            /* Sombras Modo Claro para Efecto Relieve */
            --btn-bg: #f0f2f5;
            --btn-sombra-oscura: rgba(163, 177, 198, 0.5);
            --btn-sombra-clara: rgba(255, 255, 255, 0.9);
            --icono-hundido: rgba(0, 0, 0, 0.15);
            --sombra-header: rgba(0, 0, 0, 0.05);
        }

        body.modo-oscuro {
            /* Colores Modo Oscuro */
            --bg-principal: #121212;
            --bg-tarjetas: #1e1e1e;
            --bg-sidebar: #1e293b;
            --texto-principal: #f3f4f6;
            --texto-secundario: #9ca3af;
            --borde-color: #334155;
            
            /* Sombras Modo Oscuro para Efecto Relieve */
            --btn-bg: #242424;
            --btn-sombra-oscura: rgba(0, 0, 0, 0.6);
            --btn-sombra-clara: rgba(255, 255, 255, 0.05);
            --icono-hundido: rgba(255, 255, 255, 0.1);
            --sombra-header: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            transition: background-color 0.2s, color 0.2s;
            min-height: 100vh;
            overflow-x: hidden;
            width: 100%;
        }

        .contenedor-principal {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========================================== */
        /* 2. ENCABEZADO FIJO (HEADER)                */
        /* ========================================== */
        header {
            position: fixed;
            top: 0;
            left: 0; /* Cambiado a left: 0 para que sea un anclaje natural */
            width: 100%;
            height: var(--alto-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background-color: var(--bg-tarjetas);
            box-shadow: 0 2px 8px var(--sombra-header);
            z-index: 1000;
            /* Agregamos transform para que se mueva exactamente igual al contenedor */
            transition: background-color 0.2s, box-shadow 0.2s, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header-izq, .header-der {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 80px;
        }

        .header-der {
            justify-content: flex-end;
        }

        header h2 {
            margin: 0;
            font-size: 1rem;
            text-align: center;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .placeholder-btn {
            background-color: var(--bg-sidebar);
            border: 1px dashed var(--borde-color);
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 4px;
            color: var(--texto-secundario);
            user-select: none;
            cursor: pointer;
        }

        /* ========================================== */
        /* 3. BOTÓN CON RELIEVE Y ICONO SUMIDO        */
        /* ========================================== */
        .btn-relieve {
            background-color: var(--btn-bg);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 
                -2px -2px 5px var(--btn-sombra-clara),
                2px 2px 5px var(--btn-sombra-oscura);
        }

        .btn-relieve span {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--texto-principal); 
            opacity: 0.85;
            transition: all 0.2s ease;
            text-shadow: 
                1px 1px 1px var(--btn-sombra-clara), 
                -1px -1px 1px var(--icono-hundido);
        }

        .btn-relieve:active {
            box-shadow: 
                inset -2px -2px 4px var(--btn-sombra-clara),
                inset 2px 2px 4px var(--btn-sombra-oscura);
            transform: scale(0.98);
        }

        /* ========================================== */
        /* 4. BARRA LATERAL (SIDEBAR)                 */
        /* ========================================== */
        aside {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: var(--ancho-sidebar);
            background-color: var(--bg-sidebar);
            z-index: 2000;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding: 20px;
        }

        aside h3 {
            margin-top: 0;
        }

        /* ========================================== */
        /* 5. ÁREA DE CONTENIDO (MAIN)                */
        /* ========================================== */
        main {
            padding-top: calc(var(--alto-header) + 20px);
            padding-left: 20px;
            padding-right: 20px;
            padding-bottom: 40px;
            width: 100%;
            max-width: 100%;
            flex-grow: 1;
        }

        .titulo-contenido {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.2rem;
        }

        .regla-prueba {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .regla-prueba li {
            display: flex;
            align-items: center;
            padding: 14px 0;
            font-family: monospace;
            font-size: 1rem;
        }

        .regla-prueba li::after {
            content: "";
            flex-grow: 1;
            margin-left: 10px;
            border-bottom: 3px dotted var(--borde-color); 
            height: 1px;
        }

        /* ========================================== */
        /* 6. DISPOSITIVOS COMPUTADORA (CORREGIDO)    */
        /* ========================================== */
        @media (min-width: 768px) {
            /* Al abrir, el contenedor se desplaza exactamente el ancho de la barra */
            body.sidebar-abierta .contenedor-principal {
                transform: translateX(var(--ancho-sidebar));
                width: calc(100% - var(--ancho-sidebar));
            }
            
            /* SOLUCIÓN AL DESFASE: El encabezado ahora acompaña el movimiento */
            /* de forma idéntica, manteniendo sus dimensiones emparejadas al milímetro */
            body.sidebar-abierta header {
                transform: translateX(var(--ancho-sidebar));
                width: calc(100% - var(--ancho-sidebar));
            }
            
            body.sidebar-abierta aside {
                transform: translateX(0);
            }
            
            main {
                padding-left: 40px;
                padding-right: 40px;
            }
            header h2 {
                font-size: 1.1rem;
            }
        }

        /* ========================================== */
        /* 7. DISPOSITIVOS MÓVILES (CELULARES)        */
        /* ========================================== */
        @media (max-width: 767px) {
            body.sidebar-abierta aside {
                transform: translateX(0);
                box-shadow: 5px 0 15px rgba(0,0,0,0.2);
            }
            .contenedor-principal {
                width: 100vw;
                max-width: 100vw;
            }
        }
    </style>
</head>
<body>

    <!-- BARRA LATERAL (SIDEBAR) -->
    <aside id="barra-lateral">
        <h3>Navegación</h3>
        <p style="font-size:0.9rem; color: var(--texto-secundario);">(Aquí irán tus secciones pronto)</p>
        <button onclick="toggleSidebar()" class="placeholder-btn" style="width:100%; border-style:solid; margin-top: 20px;">Cerrar Menú</button>
    </aside>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="contenedor-principal" id="contenedor-principal">
        
        <!-- ENCABEZADO (HEADER) -->
        <header id="encabezado-fijo">
            <div class="header-izq">
                <span class="placeholder-btn" onclick="toggleSidebar()" style="border-style:solid; font-weight:bold;">☰</span>
            </div>
            
            <h2>Mi Sitio Web</h2>
            
            <div class="header-der">
                <!-- BOTÓN CON RELIEVE CÍCLICO (Actualizado con tu cambio de A normal) -->
                <button id="btn-tema" class="btn-relieve" onclick="rotarTema()" title="Cambiar Tema">
                    <span id="icono-tema">A</span>
                </button>
                <span class="placeholder-btn">[ ••• ]</span>
            </div>
        </header>

        <!-- CONTENIDO PRINCIPAL -->
        <main>
            <h3 class="titulo-contenido">Verificación de Comportamiento Híbrido</h3>
            <p style="text-align: center; font-size: 0.9rem; color: var(--texto-secundario); margin-bottom: 30px;">
                Usa el nuevo botón biselado en la esquina superior derecha para alternar los modos visuales en tiempo real.
            </p>
            
            <ul class="regla-prueba">
                <li>01</li>
                <li>02</li>
                <li>03</li>
                <li>04</li>
                <li>05</li>
            </ul>
        </main>
    </div>

    <!-- EL CEREBRO JAVASCRIPT -->
    <script>
        function toggleSidebar() {
            document.body.classList.toggle('sidebar-abierta');
        }

        const detectorSistema = window.matchMedia('(prefers-color-scheme: dark)');
        
        // Mapeo con tu cambio aplicado: 'A' limpia en lugar de la versión con círculo
        const mapasTemas = {
            'auto': { siguiente: 'light', icono: 'A' },
            'light': { siguiente: 'dark', icono: '☼' },
            'dark': { siguiente: 'auto', icono: '☽' }
        };

        function aplicarTema(tema) {
            if (tema === 'dark') {
                document.body.classList.add('modo-oscuro');
            } else if (tema === 'light') {
                document.body.classList.remove('modo-oscuro');
            } else if (tema === 'auto') {
                if (detectorSistema.matches) {
                    document.body.classList.add('modo-oscuro');
                } else {
                    document.body.classList.remove('modo-oscuro');
                }
            }
            
            document.getElementById('icono-tema').textContent = mapasTemas[tema].icono;
        }

        function rotarTema() {
            const temaActual = localStorage.getItem('tema-guardado') || 'auto';
            const proximoTema = mapasTemas[temaActual].siguiente;
            
            localStorage.setItem('tema-guardado', proximoTema);
            aplicarTema(proximoTema);
        }

        const temaInicial = localStorage.getItem('tema-guardado') || 'auto';
        aplicarTema(temaInicial);

        detectorSistema.addEventListener('change', () => {
            const temaActual = localStorage.getItem('tema-guardado') || 'auto';
            if (temaActual === 'auto') {
                aplicarTema('auto');
            }
        });
    </script>

</body>
</html>
