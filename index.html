<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La web de Yoty-y</title>
    
    <style>
        /* ========================================== */
        /* 1. VARIABLES Y CONFIGURACIÓN BASE          */
        /* ========================================== */
        :root {
            --ancho-sidebar-mini: 65px;  
            --ancho-sidebar-total: 260px; 
            --alto-header: 55px;
            
            /* Colores Modo Claro */
            --bg-principal: #f4f4f9;
            --bg-tarjetas: #ffffff;
            --bg-sidebar: #e2e8f0;
            --texto-principal: #1a1a1a;
            --texto-secundario: #64748b;
            --borde-color: #cbd5e1;
            
            /* Material Unificado (Modo Claro) */
            --btn-bg: #f1f5f9;
            --btn-sombra-oscura: rgba(148, 163, 184, 0.3);
            --btn-sombra-clara: rgba(255, 255, 255, 0.8);
            --icono-sumido: rgba(0, 0, 0, 0.15);
            --sombra-general: rgba(0, 0, 0, 0.05);
        }

        body.modo-oscuro {
            /* Colores Modo Oscuro */
            --bg-principal: #121212;
            --bg-tarjetas: #1e1e1e;
            --bg-sidebar: #1e293b;
            --texto-principal: #f3f4f6;
            --texto-secundario: #9ca3af;
            --borde-color: #334155;
            
            /* Material Unificado (Modo Oscuro) */
            --btn-bg: #27272a;
            --btn-sombra-oscura: rgba(0, 0, 0, 0.5);
            --btn-sombra-clara: rgba(255, 255, 255, 0.05);
            --icono-sumido: rgba(255, 255, 255, 0.1);
            --sombra-general: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            transition: background-color 0.2s, color 0.2s;
            min-height: 100vh;
            overflow-x: hidden;
            width: 100%;
        }

        /* ========================================== */
        /* 2. CONTENEDOR DE LA INTERFAZ               */
        /* ========================================== */
        .contenido-interfaz {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========================================== */
        /* 3. ENCABEZADO (HEADER STICKY)              */
        /* ========================================== */
        header {
            position: sticky;
            top: 0;
            width: 100%;
            height: var(--alto-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background-color: var(--bg-tarjetas);
            box-shadow: 0 2px 8px var(--sombra-general);
            z-index: 1000;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .header-izq, .header-der {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Oculto por defecto en PC para evitar duplicados */
        .btn-menu-movil {
            display: none;
        }

        header h2 {
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ========================================== */
        /* 4. BOTONES INTERACTIVOS (MISMO MATERIAL)   */
        /* ========================================== */
        .btn-interactivo {
            background-color: var(--btn-bg);
            border: 1px solid var(--borde-color);
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 
                -1px -1px 4px var(--btn-sombra-clara),
                1px 1px 4px var(--btn-sombra-oscura);
        }

        .btn-interactivo span {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--texto-principal);
            opacity: 0.85;
            transition: all 0.2s ease;
            text-shadow: 
                1px 1px 1px var(--btn-sombra-clara), 
                -1px -1px 1px var(--icono-sumido);
        }

        .btn-interactivo:active {
            box-shadow: 
                inset -1px -1px 3px var(--btn-sombra-clara),
                inset 1px 1px 3px var(--btn-sombra-oscura);
            transform: scale(0.96);
        }

        /* ========================================== */
        /* 5. BARRA LATERAL (SIDEBAR DOCK)            */
        /* ========================================== */
        aside {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: var(--ancho-sidebar-mini); 
            background-color: var(--bg-sidebar);
            z-index: 2000;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 9px 13px; 
            gap: 20px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .opcion-navegacion {
            display: flex;
            align-items: center;
            width: 100%;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            gap: 15px;
        }

        .texto-opcion {
            font-size: 0.95rem;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0; 
            transform: translateX(-10px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }

        body.sidebar-abierta aside {
            width: var(--ancho-sidebar-total);
        }

        body.sidebar-abierta .texto-opcion {
            opacity: 1; 
            transform: translateX(0);
            pointer-events: auto;
        }

        .divisor-sidebar {
            width: 100%;
            border-bottom: 1px solid var(--borde-color);
            padding-bottom: 5px;
            margin-bottom: -5px;
        }

        /* ========================================== */
        /* 6. ÁREA DE CONTENIDO (MAIN)                */
        /* ========================================== */
        main {
            padding: 20px;
            width: 100%;
            max-width: 100%;
            flex-grow: 1;
        }

        .titulo-contenido {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.2rem;
        }

        .regla-prueba {
            list-style: none;
        }

        .regla-prueba li {
            display: flex;
            align-items: center;
            padding: 14px 0;
            font-family: monospace;
            font-size: 1rem;
        }

        .regla-prueba li::after {
            content: "";
            flex-grow: 1;
            margin-left: 10px;
            border-bottom: 3px dotted var(--borde-color); 
            height: 1px;
        }

        .overlay-fondo {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 1500;
        }

        /* ========================================== */
        /* 7. COMPORTAMIENTO COMPUTADORA (PC)         */
        /* ========================================== */
        @media (min-width: 768px) {
            .contenido-interfaz {
                padding-left: var(--ancho-sidebar-mini);
            }
            
            body.sidebar-abierta .contenido-interfaz {
                transform: translateX(calc(var(--ancho-sidebar-total) - var(--ancho-sidebar-mini)));
                width: calc(100% - (var(--ancho-sidebar-total) - var(--ancho-sidebar-mini)));
            }
            
            main {
                padding: 40px;
            }
            header h2 {
                font-size: 1.1rem;
            }
        }

        /* ========================================== */
        /* 8. COMPORTAMIENTO CELULARES                */
        /* ========================================== */
        @media (max-width: 767px) {
            /* El botón del menú reaparece únicamente en la barra superior móvil */
            .btn-menu-movil {
                display: flex;
            }

            aside {
                transform: translateX(-100%);
                width: var(--ancho-sidebar-total) !important; 
            }
            
            body.sidebar-abierta aside {
                transform: translateX(0);
                box-shadow: 5px 0 15px rgba(0,0,0,0.2);
            }

            body.sidebar-abierta .texto-opcion {
                opacity: 1;
                transform: translateX(0);
            }
            
            body.sidebar-abierta .overlay-fondo {
                display: block; 
            }
        }
    </style>
</head>
<body>

    <!-- CAPA OSCURA PARA CELULARES -->
    <div class="overlay-fondo" onclick="toggleSidebar()"></div>

    <!-- BARRA LATERAL INTERACTIVA (DOCK) -->
    <aside id="barra-lateral">
        <!-- Interruptor Máster Único (Visible en PC para expandir y en celular para regresar) -->
        <div class="opcion-navegacion divisor-sidebar" onclick="toggleSidebar()">
            <button class="btn-interactivo" style="flex-shrink: 0;">
                <span>☰</span>
            </button>
            <span class="texto-opcion" style="font-weight: bold; color: var(--texto-secundario);">Menú Lateral</span>
        </div>

        <!-- Opción A -->
        <div class="opcion-navegacion">
            <button class="btn-interactivo" style="flex-shrink: 0;">
                <span>A</span>
            </button>
            <span class="texto-opcion">Texto Uno</span>
        </div>

        <!-- Opción B -->
        <div class="opcion-navegacion">
            <button class="btn-interactivo" style="flex-shrink: 0;">
                <span>B</span>
            </button>
            <span class="texto-opcion">Texto Dos</span>
        </div>

        <!-- Opción C -->
        <div class="opcion-navegacion">
            <button class="btn-interactivo" style="flex-shrink: 0;">
                <span>C</span>
            </button>
            <span class="texto-opcion">Texto Tres</span>
        </div>

        <!-- Opción D -->
        <div class="opcion-navegacion">
            <button class="btn-interactivo" style="flex-shrink: 0;">
                <span>D</span>
            </button>
            <span class="texto-opcion">Texto Cuatro</span>
        </div>
    </aside>

    <!-- CONTENEDOR INTEGRADO (HEADER + MAIN) -->
    <div class="contenido-interfaz" id="contenido-interfaz">
        
        <!-- ENCABEZADO CON DISPARADOR MÓVIL INTELIGENTE -->
        <header id="encabezado-fijo">
            <div class="header-izq">
                <!-- Este botón SOLO aparece si estás navegando desde un celular -->
                <button class="btn-interactivo btn-menu-movil" onclick="toggleSidebar()" title="Abrir Menú">
                    <span>☰</span>
                </button>
                <h2>Mi Sitio Web</h2>
            </div>
            
            <div class="header-der">
                <!-- Botón de Tema Cíclico -->
                <button id="btn-tema" class="btn-interactivo" onclick="rotarTema()" title="Cambiar Tema">
                    <span id="icono-tema">A</span>
                </button>
                
                <!-- Botón de Opciones -->
                <button class="btn-interactivo" title="Opciones">
                    <span>⋮</span>
                </button>
            </div>
        </header>

        <!-- CUERPO DE LA PÁGINA (CORAZÓN INTERCAMBIABLE) -->
        <main>
            <h3 class="titulo-contenido">Comportamiento Híbrido Corregido</h3>
            <p style="text-align: center; font-size: 0.9rem; color: var(--texto-secundario); margin-bottom: 30px;">
                Estructura 100% responsiva. En PC el menú se maneja desde el riel izquierdo; en móvil, se despliega y regresa usando el control unificado.
            </p>
            
            <ul class="regla-prueba">
                <li>01</li>
                <li>02</li>
                <li>03</li>
                <li>04</li>
                <li>05</li>
            </ul>
        </main>
    </div>

    <!-- SCRIPT DE CONTROL REACTIVO -->
    <script>
        function toggleSidebar() {
            document.body.classList.toggle('sidebar-abierta');
        }

        const detectorSistema = window.matchMedia('(prefers-color-scheme: dark)');
        
        const mapasTemas = {
            'auto': { siguiente: 'light', icono: 'A' },
            'light': { siguiente: 'dark', icono: '☼' },
            'dark': { siguiente: 'auto', icono: '☽' }
        };

        function aplicarTema(tema) {
            if (tema === 'dark') {
                document.body.classList.add('modo-oscuro');
            } else if (tema === 'light') {
                document.body.classList.remove('modo-oscuro');
            } else if (tema === 'auto') {
                if (detectorSistema.matches) {
                    document.body.classList.add('modo-oscuro');
                } else {
                    document.body.classList.remove('modo-oscuro');
                }
            }
            document.getElementById('icono-tema').textContent = mapasTemas[tema].icono;
        }

        function rotarTema() {
            const temaActual = localStorage.getItem('tema-guardado') || 'auto';
            const proximoTema = mapasTemas[temaActual].siguiente;
            
            localStorage.setItem('tema-guardado', proximoTema);
            aplicarTema(proximoTema);
        }

        const temaInicial = localStorage.getItem('tema-guardado') || 'auto';
        aplicarTema(temaInicial);

        detectorSistema.addEventListener('change', () => {
            const temaActual = localStorage.getItem('tema-guardado') || 'auto';
            if (temaActual === 'auto') {
                aplicarTema('auto');
            }
        });
    </script>

</body>
</html>
